version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: math-question-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/ssl:/etc/nginx/ssl:ro
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../frontend/build:/usr/share/nginx/html:ro
    restart: unless-stopped

